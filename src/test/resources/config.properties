env=local

# ============================================================
# Base URLs (PracticeTestAutomation)
# ============================================================
local.base.url=https://practicetestautomation.com/practice/
stage.base.url=https://practicetestautomation.com/practice/
prod.base.url=https://practicetestautomation.com/practice/

# ============================================================
# Base URL (Herokuapp)
# ============================================================
heroku.base.url=https://the-internet.herokuapp.com/

# ============================================================
# Browser settings
# ============================================================
browser=chrome
headless=false

# ============================================================
# Timeouts
# ============================================================
explicit.wait=10
page.load.timeout=30

# Optional: configurable short wait (used for quick-fail waits)
short.wait=3

# ============================================================
# Driver paths
# ============================================================
edge.driver.path=D:\\Automation Tools\\EdgeDriver\\msedgedriver.exe
gecko.driver.path=D:\\Automation Tools\\GeckoDriver\\geckodriver.exe

# ============================================================
# CI Overrides (optional)
# These can be uncommented in GitHub Actions, Jenkins, etc.
# ============================================================
# browser=chrome
# headless=true